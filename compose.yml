services:
  backend:
    build: ./backend
    init: true
    restart: unless-stopped
    networks:
      - appnet
    environment:
      DATABASE_URL: sqlite:////data/index.db
      ALLOWED_SCAN_ROOTS: /mnt/clouddrive
      REFERENCE_STRM_PATH: /mnt/reference-strm
      SCAN_BATCH_SIZE: ${SCAN_BATCH_SIZE:-250}
      SCAN_WORKERS: ${SCAN_WORKERS:-2}
      READ_ONLY_MODE: ${READ_ONLY_MODE:-true}
      ENABLE_REMOTE_WRITE: ${ENABLE_REMOTE_WRITE:-false}
      ENABLE_EXTERNAL_METADATA: ${ENABLE_EXTERNAL_METADATA:-false}
      ENABLE_REAL_MOVE: ${ENABLE_REAL_MOVE:-false}
      ENABLE_AI_TRANSLATION: ${ENABLE_AI_TRANSLATION:-false}
      CMS_SYNC_URL: ${CMS_SYNC_URL:-}
      CMS_SYNC_TIMEOUT_SECONDS: ${CMS_SYNC_TIMEOUT_SECONDS:-30}
      AI_TRANSLATION_API_KEY: ${AI_TRANSLATION_API_KEY:-}
      AI_TRANSLATION_BASE_URL: ${AI_TRANSLATION_BASE_URL:-https://api.openai.com/v1}
      AI_TRANSLATION_MODEL: ${AI_TRANSLATION_MODEL:-gpt-4.1-mini}
      TRANSLATION_MONITOR_INTERVAL_SECONDS: ${TRANSLATION_MONITOR_INTERVAL_SECONDS:-60}
      TRANSLATION_MONITOR_MAX_JOBS_PER_SCAN: ${TRANSLATION_MONITOR_MAX_JOBS_PER_SCAN:-20}
      CLOUDDRIVE_HOST_ROOT: ${CLOUDDRIVE_MOUNT_PATH:-./sample-media}
      CLOUDDRIVE_CONTAINER_ROOT: /mnt/clouddrive
      LOCAL_MEDIA_CONTAINER_ROOT: /mnt/local-media
      REFERENCE_STRM_CONTAINER_ROOT: /mnt/reference-strm
      ALLOWED_TRANSLATION_ROOTS: ${ALLOWED_TRANSLATION_ROOTS:-/mnt/local-media,/mnt/reference-strm,/mnt/clouddrive}
    volumes:
      - index-data:/data
      - type: bind
        source: ${CLOUDDRIVE_MOUNT_PATH:-./sample-media}
        target: /mnt/clouddrive
        read_only: ${CLOUDDRIVE_BIND_READ_ONLY:-true}
      - type: bind
        source: ${LOCAL_MEDIA_PATH:-./sample-reference}
        target: /mnt/local-media
        read_only: ${LOCAL_MEDIA_BIND_READ_ONLY:-true}
      - type: bind
        source: ${REFERENCE_STRM_PATH:-./sample-reference}
        target: /mnt/reference-strm
        read_only: ${REFERENCE_STRM_BIND_READ_ONLY:-true}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
    stop_grace_period: 30s

  frontend:
    build: ./frontend
    restart: unless-stopped
    networks:
      - appnet
    ports:
      - "${APP_PORT:-8080}:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  index-data:
    name: 115-media-indexer-index-data

networks:
  appnet:
    name: 115-media-indexer-appnet-v2
